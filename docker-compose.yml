version: '3'

services:
  kafka1:
    image: apache/kafka:3.7.2
    container_name: kafka1
    hostname: kafka1
    ports:
      - "9092:9092"
    volumes:
      - ./config/server.1.properties:/opt/kafka/config/kraft/server.properties
      - ./data/kafka1:/var/lib/kafka/data

  kafka2:
    image: apache/kafka:3.7.2
    container_name: kafka2
    hostname: kafka2
    ports:
      - "9093:9093"
    volumes:
      - ./config/server.2.properties:/opt/kafka/config/kraft/server.properties
      - ./data/kafka2:/var/lib/kafka/data

  kafka3:
    image: apache/kafka:3.7.2
    container_name: kafka3
    hostname: kafka3
    ports:
      - "9094:9094"
    volumes:
      - ./config/server.3.properties:/opt/kafka/config/kraft/server.properties
      - ./data/kafka3:/var/lib/kafka/data

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    command: >
      bash -c "/opt/spark/sbin/start-master.sh && tail -f /opt/spark/logs/*"
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./data/spark-work-dir:/opt/spark/work-dir

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    command: >
      bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /opt/spark/logs/*"

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2
    hostname: spark-worker-2
    depends_on:
      - spark-master
    command: >
      bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /opt/spark/logs/*"