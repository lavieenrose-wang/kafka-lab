version: '3'

services:
  kafka1:
    image: apache/kafka:3.7.2
    container_name: kafka1
    hostname: kafka1
    ports:
      - "9092:9092"
    volumes:
      - ./config/server.1.properties:/opt/kafka/config/kraft/server.properties
      - ./data/kafka1:/var/lib/kafka/data

  kafka2:
    image: apache/kafka:3.7.2
    container_name: kafka2
    hostname: kafka2
    ports:
      - "9093:9093"
    volumes:
      - ./config/server.2.properties:/opt/kafka/config/kraft/server.properties
      - ./data/kafka2:/var/lib/kafka/data

  kafka3:
    image: apache/kafka:3.7.2
    container_name: kafka3
    hostname: kafka3
    ports:
      - "9094:9094"
    volumes:
      - ./config/server.3.properties:/opt/kafka/config/kraft/server.properties
      - ./data/kafka3:/var/lib/kafka/data